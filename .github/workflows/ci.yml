name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim
    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check import sorting with isort
        run: isort --check-only src/ tests/

      - name: Lint with flake8
        run: flake8 src/ tests/

      - name: Type check with mypy
        run: mypy src/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    container:
      image: python:${{ matrix.python-version }}-slim
    steps:
      - name: Install git and nodejs
        run: |
          apt-get update
          apt-get install -y git nodejs

      - name: Checkout repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -m 'not perf' \
            --cov=src/relics \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html:coverage-html

      # Upload artifacts - use platform-specific actions
      - name: Upload coverage XML report (GitHub)
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11' && contains(github.server_url, 'github.com')
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage XML report (Forgejo)
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: matrix.python-version == '3.11' && !contains(github.server_url, 'github.com')
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage HTML report (GitHub)
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11' && contains(github.server_url, 'github.com')
        with:
          name: coverage-html
          path: coverage-html/

      - name: Upload coverage HTML report (Forgejo)
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: matrix.python-version == '3.11' && !contains(github.server_url, 'github.com')
        with:
          name: coverage-html
          path: coverage-html/
