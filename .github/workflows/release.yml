name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install ".[all,dev]"

      - name: Audit installed dependencies
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install pip-audit
          python -m pip_audit --local

      - name: Run tests
        run: python -m pytest tests -m 'not perf'

      - name: Lint and type check
        if: matrix.python-version == '3.11'
        run: |
          black --check src tests
          isort --check-only src tests
          flake8 src tests
          mypy src

  package:
    name: Build and attest distributions
    needs: test
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install package tools
        run: python -m pip install build cyclonedx-bom twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Smoke test wheel and source distribution
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          sdist="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$wheel"
          test -n "$sdist"
          python -m venv "${{ runner.temp }}/wheel-smoke"
          "${{ runner.temp }}/wheel-smoke/bin/python" -m pip install \
            "${wheel}[metrics,websocket,numpy]"
          "${{ runner.temp }}/wheel-smoke/bin/python" -c \
            'from importlib.metadata import version; from importlib.resources import files; import relics; assert relics.__version__ == version("relics-ecs"); assert files("relics").joinpath("py.typed").is_file()'
          python -m venv "${{ runner.temp }}/sdist-smoke"
          "${{ runner.temp }}/sdist-smoke/bin/python" -m pip install "$sdist"
          "${{ runner.temp }}/sdist-smoke/bin/python" -c \
            'from importlib.metadata import version; import relics; assert relics.__version__ == version("relics-ecs")'

      - name: Generate reproducible CycloneDX SBOM
        run: |
          cyclonedx-py environment "${{ runner.temp }}/wheel-smoke" \
            --output-format JSON \
            --output-file dist/relics-ecs.cdx.json \
            --output-reproducible

      - name: Record distribution hashes
        run: |
          cd dist
          sha256sum *.whl *.tar.gz relics-ecs.cdx.json > SHA256SUMS
          test -s SHA256SUMS

      - name: Attest distribution provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest wheel SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl
          sbom-path: dist/relics-ecs.cdx.json

      - name: Upload validated distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  publish-pypi:
    name: Publish signed release to PyPI
    needs: package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out signed release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify annotated tag signature and package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.type')"
          object_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.sha')"
          test "$object_type" = "tag"
          verified="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" --jq '.verification.verified')"
          test "$verified" = "true"
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v${package_version}"

      - name: Download exact validated distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions-${{ github.sha }}
          path: dist

      - name: Verify distribution hashes
        run: cd dist && sha256sum -c SHA256SUMS

      - name: Select publishable distributions
        run: |
          mkdir publish
          cp dist/*.whl dist/*.tar.gz publish/

      - name: Publish with Trusted Publishing and PyPI attestations
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: publish/
          attestations: true
